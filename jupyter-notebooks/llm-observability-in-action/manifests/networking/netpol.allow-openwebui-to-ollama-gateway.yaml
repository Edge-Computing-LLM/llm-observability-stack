apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-openwebui-to-ollama-gateway
  namespace: llm-observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ollama-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: open-webui
      ports:
        - protocol: TCP
          port: 8000
