namespace:
  create: true
  name: llm-observability

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
  blackbox:
    enabled: true
  prometheusRules:
    enabled: true
  grafanaDashboards:
    enabled: true

kube-prometheus-stack:
  enabled: true
  grafana:
    adminUser: admin
    adminPassword: admin
    persistence:
      enabled: true
      storageClassName: local-path
      size: 5Gi

opentelemetry-operator:
  enabled: false

opentelemetry-collector:
  enabled: true
  serviceMonitor:
    enabled: true

opentelemetry:
  enabled: true
  tracing:
    enabled: true
    genAI:
      enabled: true

# This local k3s node already has the NVIDIA substrate from k3s-nvidia-edge.
# Do not install GPU Operator, NVIDIA device plugin, or DCGM exporter from this chart.
gpu-operator:
  enabled: false
nvidia-device-plugin:
  enabled: false
dcgm-exporter:
  enabled: false

networkPolicy:
  enabled: false


nvidia:
  runtimeClassName: nvidia
  gpuResourceName: nvidia.com/gpu
  gpuCount: 1

ollamaModel:
  enabled: true
  name: gemma3-1b-it-gguf-local
  createAtStartup: true
  gguf:
    enabled: true
    hostPath: /media/waqasm86/External1/Waqas-Projects/repos-llamatelemetry/llamatelemetry-xubuntu24/models
    filename: gemma-3-1b-it-Q4_K_M.gguf
    mountPath: /models/gguf
  modelfile:
    file: Modelfile.gemma-3-1b-it-gguf

ollama:
  enabled: true
  runtimeClassName: nvidia
  nodeSelector:
    nvidia.com/gpu.present: "true"
  image:
    repository: ollama/ollama
    tag: 0.17.7
    pullPolicy: IfNotPresent
  ollama:
    gpu:
      enabled: true
      type: nvidia
      number: 1
      nvidiaResource: nvidia.com/gpu
    models:
      pull: []
      run:
        - gemma3-1b-it-gguf-local
      runPrompt: "Reply with exactly: model ready"
      create:
        - name: gemma3-1b-it-gguf-local
          configMapRef: ollama-local-modelfile
          configMapKeyRef: Modelfile
  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 5Gi
    annotations:
      "helm.sh/resource-policy": keep
  service:
    type: ClusterIP
    port: 11434
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 3000m
      memory: 5Gi
  volumeMounts:
    - name: local-gguf-model
      mountPath: /models/gguf
      readOnly: true
  volumes:
    - name: local-gguf-model
      hostPath:
        path: /media/waqasm86/External1/Waqas-Projects/repos-llamatelemetry/llamatelemetry-xubuntu24/models
        type: Directory
  extraEnv:
    - name: OLLAMA_KEEP_ALIVE
      value: "-1"
    - name: OLLAMA_NUM_PARALLEL
      value: "1"
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "1"
    - name: OLLAMA_CONTEXT_LENGTH
      value: "1024"

ollamaGateway:
  enabled: true
  image:
    repository: ollama-gateway
    tag: 0.2.0
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 750m
      memory: 768Mi

openWebUI:
  enabled: true
  auth: false
  ollamaBaseUrl: http://ollama-gateway:8000/ollama
  webuiSecretKey: replace-with-a-32-plus-char-secret
  service:
    type: ClusterIP
    port: 8080

open-webui:
  enabled: true
  service:
    type: ClusterIP
    port: 8080
    containerPort: 8080
  ollamaUrls:
    - http://ollama-gateway:8000/ollama
  extraEnvVars:
    - name: OLLAMA_BASE_URL
      value: http://ollama-gateway:8000/ollama
    - name: ENABLE_PERSISTENT_CONFIG
      value: "False"
    - name: WEBUI_AUTH
      value: "False"
    - name: ENABLE_VERSION_UPDATE_CHECK
      value: "False"
    - name: RAG_EMBEDDING_ENGINE
      value: ollama
    - name: RAG_EMBEDDING_MODEL
      value: gemma3-1b-it-gguf-local
    - name: RAG_EMBEDDING_MODEL_AUTO_UPDATE
      value: "False"
    - name: RAG_RERANKING_MODEL_AUTO_UPDATE
      value: "False"
    - name: WHISPER_MODEL_AUTO_UPDATE
      value: "False"

redis:
  enabled: false

edgeToolbox:
  enabled: true
  image:
    repository: edge-toolbox
    tag: 0.2.0
    pullPolicy: IfNotPresent

otelTraceSeeder:
  enabled: false

etcd:
  enabled: false
