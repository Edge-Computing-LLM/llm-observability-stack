namespace:
  create: true
  name: llm-observability

monitoring:
  enabled: true
  blackbox:
    # This compact local profile does not deploy a blackbox exporter.
    enabled: false
  dcgmExporter:
    serviceMonitor:
      enabled: true
      namespace: gpu-operator
      interval: 15s
      port: gpu-metrics
      path: /metrics
      selector:
        app: nvidia-dcgm-exporter
  grafanaDashboards:
    enabled: true
networkPolicy:
  enabled: false

# A resource-conscious Prometheus/Grafana deployment for the validated
# single-node GeForce 940M profile. The dashboards under dashboards/*.json are
# discovered by the Grafana sidecar from the root chart's ConfigMap.
kube-prometheus-stack:
  enabled: true
  crds:
    enabled: true
  defaultRules:
    create: false
  alertmanager:
    enabled: false
  grafana:
    enabled: true
    defaultDashboardsEnabled: false
    adminUser: admin
    adminPassword: admin
    persistence:
      enabled: false
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
        provider:
          allowUiUpdates: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  prometheus:
    enabled: true
    prometheusSpec:
      retention: 6h
      retentionSize: 1GB
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      scrapeConfigSelectorNilUsesHelmValues: false
      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          cpu: 1000m
          memory: 1536Mi
  prometheusOperator:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi
  kube-state-metrics:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 256Mi
  prometheus-node-exporter:
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi
  kubeEtcd:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false

nvidia:
  runtimeClassName: nvidia
  gpuResourceName: nvidia.com/gpu
  gpuCount: 1

ollamaModel:
  enabled: true
  name: qwen-1-8b-chat-q4-k-m-local
  createAtStartup: true
  warmupPrompt: Say hello in one short sentence.
  gguf:
    enabled: true
    hostPath: /media/waqasm86/External1/Waqas-Projects/repos-llamatelemetry/llamatelemetry-xubuntu24/models
    filename: qwen-1.8b-chat-q4_K_M.gguf
    mountPath: /models/gguf
  modelfile:
    file: Modelfile.qwen-1.8b-chat-q4_K_M

ollama:
  enabled: true
  runtimeClassName: nvidia
  nodeSelector:
    nvidia.com/gpu.present: "true"
  image:
    repository: ollama/ollama
    tag: 0.17.7
    pullPolicy: IfNotPresent
  ollama:
    gpu:
      enabled: true
      type: nvidia
      number: 1
      nvidiaResource: nvidia.com/gpu
    models:
      pull: []
      run:
        - qwen-1-8b-chat-q4-k-m-local
      runPrompt: "Reply with exactly: model ready"
      create:
        - name: qwen-1-8b-chat-q4-k-m-local
          configMapRef: ollama-local-modelfile
          configMapKeyRef: Modelfile
  persistentVolume:
    enabled: true
    storageClass: local-path
    size: 5Gi
    annotations:
      "helm.sh/resource-policy": keep
  service:
    type: ClusterIP
    port: 11434
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 3000m
      memory: 5Gi
  volumeMounts:
    - name: local-gguf-model
      mountPath: /models/gguf
      readOnly: true
  volumes:
    - name: local-gguf-model
      hostPath:
        path: /media/waqasm86/External1/Waqas-Projects/repos-llamatelemetry/llamatelemetry-xubuntu24/models
        type: Directory
  extraEnv:
    - name: OLLAMA_KEEP_ALIVE
      value: "-1"
    - name: OLLAMA_NUM_PARALLEL
      value: "1"
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "1"
    - name: OLLAMA_CONTEXT_LENGTH
      value: "256"

openWebUI:
  enabled: true
  fullnameOverride: open-webui
  ollamaBaseUrl: http://ollama:11434
  webuiSecretKey: ""
  existingSecret: ""
  existingSecretKey: WEBUI_SECRET_KEY
  auth: false
  persistence:
    enabled: true
    size: 2Gi
    storageClass: local-path
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
open-webui:
  enabled: true
  fullnameOverride: open-webui
  image:
    repository: ghcr.io/open-webui/open-webui
    tag: 0.8.10
    pullPolicy: IfNotPresent
  ollama:
    enabled: false
  pipelines:
    enabled: false
  tika:
    enabled: false
  websocket:
    enabled: true
    url: ""
    redis:
      enabled: true
  ollamaUrls:
    - http://ollama:11434
  enableOpenaiApi: false
  openaiBaseApiUrl: ""
  openaiApiKey: ""
  webuiSecret:
    enabled: true
    existingSecretName: ""
    existingSecretKey: WEBUI_SECRET_KEY
  persistence:
    enabled: true
    size: 2Gi
    storageClass: local-path
  service:
    type: ClusterIP
    port: 8080
    containerPort: 8080
  runtimeClassName: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1500Mi
  extraEnvVars:
    - name: OLLAMA_BASE_URL
      value: http://ollama:11434
    - name: ENABLE_PERSISTENT_CONFIG
      value: "False"
    - name: WEBUI_AUTH
      value: "False"
    - name: ENABLE_VERSION_UPDATE_CHECK
      value: "False"
    - name: RAG_EMBEDDING_ENGINE
      value: ollama
    - name: RAG_EMBEDDING_MODEL
      value: qwen-1-8b-chat-q4-k-m-local
    - name: RAG_EMBEDDING_MODEL_AUTO_UPDATE
      value: "False"
    - name: RAG_RERANKING_MODEL_AUTO_UPDATE
      value: "False"
    - name: WHISPER_MODEL_AUTO_UPDATE
      value: "False"
redis:
  enabled: false
ollamaGateway:
  enabled: false
edgeToolbox:
  enabled: false
otelTraceSeeder:
  enabled: false
etcd:
  enabled: false
