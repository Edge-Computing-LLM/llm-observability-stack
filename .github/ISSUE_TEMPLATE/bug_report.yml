name: Bug report
description: Report a reproducible problem in llm-observability-stack
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please include enough detail to reproduce and debug quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Short description of the problem
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: k3s/Kubernetes version, OS, GPU mode, chart version/commit
      placeholder: |
        k3s: v1.xx
        OS: Ubuntu 22.04
        GPU resource: nvidia.com/gpu.shared
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      description: Exact commands and values files used (without secrets)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / Logs
      description: Paste relevant logs or kubectl output
    validations:
      required: true
  - type: checkboxes
    id: precheck
    attributes:
      label: Validation Checklist
      options:
        - label: I ran `helm lint .`
        - label: I rendered `helm template` with defaults and local example values
        - label: I removed secrets/tokens from this issue
