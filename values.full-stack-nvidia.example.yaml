namespace:
  create: true
  name: llm-observability

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
  blackbox:
    enabled: true
  prometheusRules:
    enabled: true
  grafanaDashboards:
    enabled: true
  dcgmExporter:
    serviceMonitor:
      enabled: false
  nim:
    serviceMonitor:
      enabled: false

kube-prometheus-stack:
  enabled: true

opentelemetry-operator:
  enabled: false

opentelemetry-collector:
  enabled: true
  serviceMonitor:
    enabled: true

gpu-operator:
  enabled: false

nvidia-device-plugin:
  enabled: true
  migStrategy: none

dcgm-exporter:
  enabled: true
  serviceMonitor:
    additionalLabels:
      release: kube-prometheus-stack

networkPolicy:
  enabled: true
  monitoringNamespace: monitoring

nvidia:
  runtimeClassName: nvidia
  gpuResourceName: nvidia.com/gpu
  gpuCount: 1

ollama:
  runtimeClassName: nvidia
  ollama:
    gpu:
      enabled: true
      type: nvidia
      number: 1
      nvidiaResource: nvidia.com/gpu
    models:
      run:
        - gemma3-1b-it-gguf-local
      runPrompt: "Reply with exactly: model ready"
  extraEnv:
    - name: OLLAMA_KEEP_ALIVE
      value: "-1"
    - name: OLLAMA_NUM_PARALLEL
      value: "1"
    - name: OLLAMA_MAX_LOADED_MODELS
      value: "1"
    - name: OLLAMA_CONTEXT_LENGTH
      value: "1024"


openWebUI:
  auth: true
  existingSecret: open-webui-secrets
  existingSecretKey: WEBUI_SECRET_KEY

open-webui:
  extraEnvVars:
    - name: OLLAMA_BASE_URL
      value: http://langchain-demo:8000/ollama
    - name: ENABLE_PERSISTENT_CONFIG
      value: "False"
    - name: WEBUI_AUTH
      value: "True"
  webuiSecret:
    enabled: true
    existingSecretName: open-webui-secrets
    existingSecretKey: WEBUI_SECRET_KEY
