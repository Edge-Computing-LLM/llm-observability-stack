{{- if .Values.langchainDemo.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: langchain-demo-app
  namespace: {{ include "llm-observability-stack.namespace" . }}
data:
  app.py: |
    import os
    from fastapi import FastAPI, HTTPException
    from pydantic import BaseModel
    from langchain_ollama import ChatOllama

    app = FastAPI(title="k3s-ollama-langsmith-demo")

    def get_llm():
        return ChatOllama(
            model=os.environ.get("OLLAMA_MODEL", "gemma3-1b-it-gguf-local"),
            base_url=os.environ.get("OLLAMA_BASE_URL", "http://ollama:11434"),
            temperature=float(os.environ.get("OLLAMA_TEMPERATURE", "0.2")),
        )

    class PromptIn(BaseModel):
        prompt: str

    @app.get("/healthz")
    def healthz():
        return {
            "status": "ok",
            "model": os.environ.get("OLLAMA_MODEL"),
            "ollama_base_url": os.environ.get("OLLAMA_BASE_URL"),
            "langsmith_project": os.environ.get("LANGSMITH_PROJECT"),
        }

    @app.post("/invoke")
    def invoke(req: PromptIn):
        try:
            llm = get_llm()
            response = llm.invoke(req.prompt)
            return {"response": getattr(response, "content", response)}
        except Exception as exc:
            raise HTTPException(status_code=500, detail=str(exc))

  requirements.txt: |
{{- range .Values.langchainDemo.packages }}
    {{ . }}
{{- end }}
{{- end }}
