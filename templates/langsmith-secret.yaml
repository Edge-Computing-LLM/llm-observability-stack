{{- if and .Values.langsmith.enabled (not .Values.langsmith.existingSecret) .Values.langsmith.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: langsmith-secrets
  namespace: {{ include "llm-observability-stack.namespace" . }}
type: Opaque
stringData:
  {{ .Values.langsmith.existingSecretKey }}: {{ .Values.langsmith.apiKey | quote }}
{{- end }}
