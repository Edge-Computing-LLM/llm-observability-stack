{{- /*
Validate cross-chart secret wiring to avoid drift between:
- root wrapper values (openWebUI.*)
- vendored open-webui values (open-webui.webuiSecret.*)
*/ -}}
{{- $openWebUISubchart := (get .Values "open-webui") | default dict -}}
{{- $webuiSecret := (get $openWebUISubchart "webuiSecret") | default dict -}}
{{- $legacySecretName := (trim (.Values.openWebUI.existingSecret | default "")) -}}
{{- $legacySecretKey := (trim (.Values.openWebUI.existingSecretKey | default "")) -}}
{{- $subchartSecretName := (trim ((get $webuiSecret "existingSecretName") | default "")) -}}
{{- $subchartSecretKey := (trim ((get $webuiSecret "existingSecretKey") | default "")) -}}

{{- if and $legacySecretName (eq $subchartSecretName "") -}}
{{- fail "openWebUI.existingSecret is set but open-webui.webuiSecret.existingSecretName is empty. Set both to the same secret name for consistent WEBUI_SECRET_KEY wiring." -}}
{{- end -}}

{{- if and $legacySecretName $subchartSecretName (ne $legacySecretName $subchartSecretName) -}}
{{- fail "Secret name mismatch: openWebUI.existingSecret must match open-webui.webuiSecret.existingSecretName." -}}
{{- end -}}

{{- if and $legacySecretKey $subchartSecretKey (ne $legacySecretKey $subchartSecretKey) -}}
{{- fail "Secret key mismatch: openWebUI.existingSecretKey must match open-webui.webuiSecret.existingSecretKey." -}}
{{- end -}}

{{- if and $subchartSecretName (eq $subchartSecretKey "") -}}
{{- fail "open-webui.webuiSecret.existingSecretName is set but open-webui.webuiSecret.existingSecretKey is empty." -}}
{{- end -}}

{{- $gpuOperator := (get .Values "gpu-operator") | default dict -}}
{{- $devicePlugin := (get .Values "nvidia-device-plugin") | default dict -}}
{{- $dcgmExporter := (get .Values "dcgm-exporter") | default dict -}}
{{- if and (get $gpuOperator "enabled") (get $devicePlugin "enabled") -}}
{{- fail "gpu-operator.enabled and nvidia-device-plugin.enabled must not both be true. gpu-operator already manages the NVIDIA device plugin." -}}
{{- end -}}
{{- if and (get $gpuOperator "enabled") (get $dcgmExporter "enabled") -}}
{{- fail "gpu-operator.enabled and dcgm-exporter.enabled must not both be true. gpu-operator already manages DCGM exporter." -}}
{{- end -}}

{{- $ollamaValues := .Values.ollama | default dict -}}
{{- $ollamaRuntime := (get $ollamaValues "ollama") | default dict -}}
{{- $ollamaModels := (get $ollamaRuntime "models") | default dict -}}
{{- if (get $ollamaModels "clean") -}}
{{- fail "ollama.ollama.models.clean must stay false. This project retains GGUF-backed Ollama models and must not render model cleanup commands." -}}
{{- end -}}

{{- $openWebUISubchartOllama := (get $openWebUISubchart "ollama") | default dict -}}
{{- $openWebUIOllamaRuntime := (get $openWebUISubchartOllama "ollama") | default dict -}}
{{- $openWebUIOllamaModels := (get $openWebUIOllamaRuntime "models") | default dict -}}
{{- if (get $openWebUIOllamaModels "clean") -}}
{{- fail "open-webui.ollama.ollama.models.clean must stay false. This project retains GGUF-backed Ollama models and must not render model cleanup commands." -}}
{{- end -}}

{{- if and .Values.ollamaModel.enabled .Values.ollamaModel.gguf.enabled -}}
{{- $ggufMountPath := .Values.ollamaModel.gguf.mountPath -}}
{{- $ggufMountReadOnly := false -}}
{{- range .Values.ollama.volumeMounts -}}
{{- if eq .mountPath $ggufMountPath -}}
{{- $ggufMountReadOnly = eq (.readOnly | default false) true -}}
{{- end -}}
{{- end -}}
{{- if not $ggufMountReadOnly -}}
{{- fail "The GGUF hostPath mount must be readOnly: true so Kubernetes workloads cannot modify or delete local GGUF model files." -}}
{{- end -}}
{{- end -}}
