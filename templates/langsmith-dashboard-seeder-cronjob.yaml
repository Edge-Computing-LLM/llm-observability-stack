{{- if .Values.langsmithDashboardSeeder.enabled }}
{{- $langsmithConfigured := and .Values.langsmith.enabled (or (ne (trim .Values.langsmith.apiKey) "") (ne (trim .Values.langsmith.existingSecret) "")) -}}
{{- $imageRepository := default .Values.pythonToolbox.image.repository .Values.langsmithDashboardSeeder.image.repository -}}
{{- $imageTag := default .Values.pythonToolbox.image.tag .Values.langsmithDashboardSeeder.image.tag -}}
{{- $imagePullPolicy := default .Values.pythonToolbox.image.pullPolicy .Values.langsmithDashboardSeeder.image.pullPolicy -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: langsmith-dashboard-seeder
  namespace: {{ include "llm-observability-stack.namespace" . }}
spec:
  schedule: {{ .Values.langsmithDashboardSeeder.schedule | quote }}
  suspend: {{ .Values.langsmithDashboardSeeder.suspend }}
  concurrencyPolicy: {{ .Values.langsmithDashboardSeeder.concurrencyPolicy | quote }}
  successfulJobsHistoryLimit: {{ .Values.langsmithDashboardSeeder.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.langsmithDashboardSeeder.failedJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .Values.langsmithDashboardSeeder.startingDeadlineSeconds }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.langsmithDashboardSeeder.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.langsmithDashboardSeeder.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: langsmith-dashboard-seeder
        spec:
{{- if .Values.langsmithDashboardSeeder.runtimeClassName }}
          runtimeClassName: {{ .Values.langsmithDashboardSeeder.runtimeClassName }}
{{- end }}
          restartPolicy: Never
          containers:
            - name: seeder
              image: {{ $imageRepository }}:{{ $imageTag }}
              imagePullPolicy: {{ $imagePullPolicy }}
              command:
{{ toYaml .Values.langsmithDashboardSeeder.command | indent 16 }}
              env:
                - name: OLLAMA_MODEL
                  value: {{ .Values.ollamaModel.name | quote }}
                - name: LANGSMITH_ENDPOINT
                  value: {{ .Values.langsmith.endpoint | quote }}
                - name: LANGCHAIN_ENDPOINT
                  value: {{ .Values.langsmith.endpoint | quote }}
                - name: LANGSMITH_PROJECT
                  value: {{ .Values.langsmith.project | quote }}
                - name: LANGCHAIN_PROJECT
                  value: {{ .Values.langsmith.project | quote }}
                - name: OBS_INFERENCE_API_URL
                  value: {{ .Values.langsmithDashboardSeeder.env.inferenceApiUrl | quote }}
                - name: OBS_CALL_COUNT
                  value: {{ .Values.langsmithDashboardSeeder.env.callCount | quote }}
                - name: OBS_TIMEOUT_SECONDS
                  value: {{ .Values.langsmithDashboardSeeder.env.timeoutSeconds | quote }}
                - name: LANGSMITH_FEEDBACK_KEY
                  value: {{ .Values.langsmithDashboardSeeder.env.feedbackKey | quote }}
{{- if $langsmithConfigured }}
                - name: LANGSMITH_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "llm-observability-stack.langsmithSecretName" . }}
                      key: {{ .Values.langsmith.existingSecretKey }}
                - name: LANGCHAIN_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "llm-observability-stack.langsmithSecretName" . }}
                      key: {{ .Values.langsmith.existingSecretKey }}
{{- end }}
{{- range .Values.langsmithDashboardSeeder.extraEnv }}
                - name: {{ .name }}
{{- if hasKey . "valueFrom" }}
                  valueFrom:
{{ toYaml .valueFrom | indent 20 }}
{{- else }}
                  value: {{ .value | quote }}
{{- end }}
{{- end }}
              resources:
{{ toYaml .Values.langsmithDashboardSeeder.resources | indent 16 }}
              volumeMounts:
                - name: seeder-scripts
                  mountPath: /opt/langsmith-seeder
                  readOnly: true
          volumes:
            - name: seeder-scripts
              configMap:
                name: langsmith-dashboard-seeder-scripts
                defaultMode: 0555
{{- end }}
