{{- if .Values.etcd.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-observability-stack.etcdFullname" . }}
  namespace: {{ include "llm-observability-stack.namespace" . }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: etcd
  ports:
    - name: client
      port: {{ .Values.etcd.service.clientPort }}
      targetPort: client
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-observability-stack.etcdFullname" . }}-headless
  namespace: {{ include "llm-observability-stack.namespace" . }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: etcd
  ports:
    - name: client
      port: {{ .Values.etcd.service.clientPort }}
      targetPort: client
    - name: peer
      port: {{ .Values.etcd.service.peerPort }}
      targetPort: peer
{{- end }}
