{{- if and .Values.monitoring.enabled .Values.monitoring.serviceMonitor.enabled .Values.ollamaGateway.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ollama-gateway
  namespace: {{ include "llm-observability-stack.namespace" . }}
  labels:
{{ toYaml .Values.monitoring.labels | indent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout }}
{{- end }}
