{{- if and .Values.openWebUI.enabled (eq (include "llm-observability-stack.manageWebuiSecret" .) "true") }}
{{- $secretName := include "llm-observability-stack.webuiSecretName" . -}}
{{- $secretKey := include "llm-observability-stack.webuiSecretKey" . -}}
{{- $placeholder := "change-this-to-at-least-32-characters" -}}
{{- $providedSecret := trim (.Values.openWebUI.webuiSecretKey | default "") -}}
{{- $isPlaceholder := or (eq $providedSecret $placeholder) (hasPrefix "replace-with-" $providedSecret) (eq $providedSecret "replace-me") -}}
{{- $existingSecret := lookup "v1" "Secret" (include "llm-observability-stack.namespace" .) $secretName -}}
{{- $existingValue := "" -}}
{{- if and $existingSecret (hasKey $existingSecret.data $secretKey) -}}
{{- $existingValue = (index $existingSecret.data $secretKey | b64dec) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "llm-observability-stack.namespace" . }}
type: Opaque
stringData:
  {{ $secretKey }}: {{- if and $providedSecret (not $isPlaceholder) }} {{ $providedSecret | quote }}{{- else if $existingValue }} {{ $existingValue | quote }}{{- else }} {{ randAlphaNum 48 | quote }}{{- end }}
{{- end }}
