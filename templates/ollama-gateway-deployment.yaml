{{- if .Values.ollamaGateway.enabled }}
{{- $probes := .Values.ollamaGateway.probes | default dict -}}
{{- $startupProbe := get $probes "startup" | default dict -}}
{{- $readinessProbe := get $probes "readiness" | default dict -}}
{{- $livenessProbe := get $probes "liveness" | default dict -}}
{{- $otelCollectorChart := (get .Values "opentelemetry-collector") | default dict -}}
{{- $otelOperator := (get .Values "opentelemetry-operator") | default dict -}}
{{- $otelOperatorCollector := (get .Values.opentelemetry "operatorCollector") | default dict -}}
{{- $otelEnabled := and .Values.opentelemetry.enabled (or (get $otelCollectorChart "enabled") (and (get $otelOperator "enabled") (get $otelOperatorCollector "enabled"))) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-gateway
  namespace: {{ include "llm-observability-stack.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-gateway
    spec:
      serviceAccountName: {{ include "llm-observability-stack.ollamaGatewayServiceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
{{ toYaml .Values.ollamaGateway.podSecurityContext | indent 8 }}
      containers:
        - name: app
          image: {{ .Values.ollamaGateway.image.repository }}:{{ .Values.ollamaGateway.image.tag }}
          imagePullPolicy: {{ .Values.ollamaGateway.image.pullPolicy }}
          securityContext:
{{ toYaml .Values.ollamaGateway.securityContext | indent 12 }}
          command:
            - /usr/local/bin/ollama-gateway
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_UPSTREAM_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              value: {{ .Values.ollamaModel.name | quote }}
            - name: OLLAMA_PROXY_PATH_PREFIX
              value: "/ollama"
            - name: OLLAMA_PROXY_TRACE_OTEL
              value: {{ ternary "true" "false" .Values.opentelemetry.tracing.enabled | quote }}
            - name: OLLAMA_PROXY_TIMEOUT
              value: "180s"
            - name: PORT
              value: {{ .Values.ollamaGateway.app.port | quote }}
            - name: OTEL_TRACES_ENABLED
              value: {{ ternary "true" "false" .Values.opentelemetry.tracing.enabled | quote }}
{{- if $otelEnabled }}
            - name: OTEL_SERVICE_NAME
              value: ollama-gateway
            - name: OTEL_SERVICE_NAMESPACE
              value: {{ include "llm-observability-stack.namespace" . | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.opentelemetry.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace={{ include "llm-observability-stack.namespace" . }},deployment.environment=k3s-nvidia-edge,k8s.cluster.name={{ .Values.cluster.name }}"
{{- end }}
{{- if .Values.etcd.enabled }}
            - name: ETCD_ENDPOINTS
              value: http://{{ include "llm-observability-stack.etcdFullname" . }}:{{ .Values.etcd.service.clientPort }}
{{- end }}
{{- range .Values.ollamaGateway.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
{{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.ollamaGateway.app.port }}
          resources:
{{ toYaml .Values.ollamaGateway.resources | indent 12 }}
{{- if (default true (get $startupProbe "enabled")) }}
          startupProbe:
            httpGet:
              path: {{ default "/healthz" (get $startupProbe "path") }}
              port: http
            initialDelaySeconds: {{ default 30 (get $startupProbe "initialDelaySeconds") }}
            periodSeconds: {{ default 10 (get $startupProbe "periodSeconds") }}
            timeoutSeconds: {{ default 3 (get $startupProbe "timeoutSeconds") }}
            failureThreshold: {{ default 60 (get $startupProbe "failureThreshold") }}
{{- end }}
{{- if (default true (get $readinessProbe "enabled")) }}
          readinessProbe:
            httpGet:
              path: {{ default "/healthz" (get $readinessProbe "path") }}
              port: http
            initialDelaySeconds: {{ default 20 (get $readinessProbe "initialDelaySeconds") }}
            periodSeconds: {{ default 10 (get $readinessProbe "periodSeconds") }}
            timeoutSeconds: {{ default 3 (get $readinessProbe "timeoutSeconds") }}
            failureThreshold: {{ default 6 (get $readinessProbe "failureThreshold") }}
{{- end }}
{{- if (default true (get $livenessProbe "enabled")) }}
          livenessProbe:
            httpGet:
              path: {{ default "/healthz" (get $livenessProbe "path") }}
              port: http
            initialDelaySeconds: {{ default 60 (get $livenessProbe "initialDelaySeconds") }}
            periodSeconds: {{ default 20 (get $livenessProbe "periodSeconds") }}
            timeoutSeconds: {{ default 3 (get $livenessProbe "timeoutSeconds") }}
            failureThreshold: {{ default 6 (get $livenessProbe "failureThreshold") }}
{{- end }}
{{- end }}
