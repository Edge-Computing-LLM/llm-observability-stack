{{- if .Values.pythonToolbox.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-toolbox
  namespace: {{ include "llm-observability-stack.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: python-toolbox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: python-toolbox
    spec:
{{- if .Values.pythonToolbox.runtimeClassName }}
      runtimeClassName: {{ .Values.pythonToolbox.runtimeClassName }}
{{- end }}
      containers:
        - name: toolbox
          image: {{ .Values.pythonToolbox.image.repository }}:{{ .Values.pythonToolbox.image.tag }}
          imagePullPolicy: {{ .Values.pythonToolbox.image.pullPolicy }}
          command:
{{ toYaml .Values.pythonToolbox.command | indent 12 }}
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              value: {{ .Values.ollamaModel.name | quote }}
            - name: OTEL_SERVICE_NAME
              value: python-toolbox
            - name: OTEL_SERVICE_NAMESPACE
              value: {{ include "llm-observability-stack.namespace" . | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.opentelemetry.endpoint | quote }}
            - name: REDIS_HOST
              value: {{ ternary (default "redis" .Values.redis.fullnameOverride) "open-webui-redis" .Values.redis.enabled | quote }}
            - name: REDIS_PORT
              value: "6379"
{{- range .Values.pythonToolbox.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
{{- end }}
          resources:
{{ toYaml .Values.pythonToolbox.resources | indent 12 }}
{{- end }}
